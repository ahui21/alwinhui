<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PokerEdge AI</title>
    <script>
      // GitHub Pages SPA redirect: preserves the path for React Router
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/pokeredge/?p=' + encodeURIComponent(path.replace('/pokeredge', '')) + window.location.search + window.location.hash
      );
    </script>
  </head>
  <body></body>
</html>
